version: 2

updates:
  # NPM
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 0 # Security updates only

  # Github Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'quarterly'
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - '*'
